# Application properties
spring.application.name=springboot-todo
server.port=8080

# MariaDB Datasource configuration
spring.datasource.url=jdbc:mariadb://localhost:3406/tododb?createDatabaseIfNotExist=true&useMysqlMetadata=true
spring.datasource.username=todouser
spring.datasource.password=todopassword
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Spring Actuator Endpoint exposure
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Springdoc OpenAPI Swagger configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
